name: MoodSync Browser — Android APK

on:
  push:
    branches: [main]
    tags:     ["v*"]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK Android
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Dépendances système
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip python3-pip \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev zlib1g-dev \
            autoconf libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake ninja-build ccache

      - name: Installer Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK debug
        run: buildozer -v android debug 2>&1 | tee build.log
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MoodSync-Browser-debug
          path: bin/*.apk
          retention-days: 30

      - name: Upload log si échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

  release:
    name: Release sur tag v*
    runs-on: ubuntu-22.04
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Dépendances
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip python3-pip build-essential \
            libssl-dev libffi-dev autoconf libtool cmake
          pip install buildozer cython==0.29.36

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Build APK release
        run: buildozer -v android release 2>&1
        timeout-minutes: 60

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MoodSync Browser Android ${{ github.ref_name }}"
          body: |
            ## 🎵 MoodSync Browser Android ${{ github.ref_name }}
            Navigateur Android dédié à MoodSync.

            **Installation :** télécharger le `.apk` → activer sources inconnues → installer.
            **Min Android :** 8.0 (API 26)
          files: bin/*.apk